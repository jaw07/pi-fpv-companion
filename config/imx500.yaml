# IMX500 airframe config — Sony IMX500 AI camera (on-sensor NPU) + ArduPilot FC.
# Deployed on the Pi Zero 2W rig. The sensor runs the network on its own NPU, so
# there is NO CPU detector and ncnn is intentionally NOT installed; the .rpk model
# below is uploaded to the sensor at startup (see camera/imx500.py).
#   run: python -m pi_fpv_companion --config config/imx500.yaml

video:
  tv_mode: PAL
  width: 720
  height: 576
  framebuffer: /dev/fb0      # auto-falls back to DRM /dev/dri/card0, then cv2 window

camera:
  type: imx500               # on-sensor inference; detections emitted inline in FrameBundle
  framerate: 30
  # NanoDet-Plus 416x416 (higher-res than the SSD-MobileNet 320): ~1.7x the input
  # pixels -> better small/distant targets, same 4-tensor output + 90 COCO labels as
  # SSD (decoder unchanged), and actually slightly faster to load (~4.9s). Switched
  # after the first flight surfaced far-target detection trouble.
  imx500_model: /usr/share/imx500-models/imx500_network_nanodet_plus_416x416_pp.rpk
  # zoom: 1.0 = full FOV (digital centre-crop zoom available but left off for now).

detector:
  type: none                 # IMX500 does detection on-sensor — no CPU/ncnn model
  # conf_threshold + classes_of_interest are still read here and applied by
  # IMX500Camera when it decodes the sensor's output tensors.
  # Raised to 0.45 after the first flight: 0.35 let aerial/top-down false positives
  # through (the COCO model isn't trained on that viewpoint).
  conf_threshold: 0.45
  classes_of_interest: [person, car, truck, motorcycle, bus, boat]

tracker:
  type: multi_iou            # track ALL detections + operator selection (select_channel).
                             # 'iou' = single auto-locked target (no manual select).
  iou_threshold: 0.3
  reacquire_after_lost_frames: 30
  # Spurious-detection suppression (first-flight fix): a track must be detected in
  # >= confirm_hits of the last confirm_window frames before it is shown/selectable,
  # so one/two-frame ghosts never reach the HUD or the lock. Off-frame coasting
  # tracks are also dropped (no boxes gliding off-screen) — see multi_target.py.
  confirm_hits: 3
  confirm_window: 5

fc:
  backend: ardupilot
  uart_device: /dev/serial0  # PL011 on header pins 8/10 (after dtoverlay=disable-bt)
  baud: 115200
  switch_channel: 7          # 3-position mode switch (STANDBY / TRACK / DIVE)
  # Target selector: a rising edge past 1700 µs in STANDBY cycles the locked target
  # among detections (frozen once engaged). The TBS top switches are full (ch5 arm,
  # ch6 FC modes, ch7 companion, ch8 camera), so this uses the first free CRSF
  # channel, ch9 — map a spare TBS input (e.g. the rocker) to ch9 in FreedomTX.
  # 0 = disabled (auto-lock highest confidence; HUD still shows all).
  select_channel: 9
  # ch7 auto-engage: leaving STANDBY (TRACK/DIVE) commands the FC into GUIDED_NOGPS
  # (DO_SET_MODE, re-sent until the HEARTBEAT confirms); returning to STANDBY restores
  # the prior mode. So ch7 alone engages — no separate FC-mode switch needed to enter.
  # OFF after flight 2 (2026-06-12): uncommanded mode changes suspected in STANDBY —
  # with auto_guided on, ANY ch7 reading >= track_threshold flips the FC into
  # GUIDED_NOGPS and takes the sticks. Keep OFF until ch7 behaviour is validated from
  # FC dataflash logs (RCIN.C7 + MODE msgs); engage via the TX flight-mode switch instead.
  auto_guided: false
  track_threshold_us: 1300   # pwm >= this -> TRACK (follow + hold range)
  dive_threshold_us: 1700    # pwm >= this -> DIVE (close the gap + dive); else STANDBY
  # GPS-denied flight path. control_mode MUST match the FC's flight mode. guided_nogps
  # (FLIGHT) = the Pi commands BODY RATES + real thrust via SET_ATTITUDE_TARGET
  # (guidance/rate_control.py); ch7 engages TRACK/DIVE, STANDBY holds a level hover.
  # REQUIRES GUID_OPTIONS bit 3 (the preflight check sets+verifies it) else the FC reads
  # thrust as a climb-rate and the dive planes.
  # Handover/failsafe: KEEP a TX flight-mode switch assigned (e.g. ch6) — flipping it
  # OUT of GUIDED_NOGPS is instant manual recovery and overrides the auto-engage, AND it
  # is the backstop if the Pi dies while engaged (the Pi can't restore the mode then; a
  # dead Pi also triggers the FC's GCS failsafe). SITL/Gazebo-validated; not yet
  # hardware-validated. stabilize / althold remain as RC-override fallbacks.
  control_mode: guided_nogps
  # FS_GCS_TIMEOUT: a camera-watchdog process restart stops our GCS heartbeat for a few
  # seconds (RestartSec=1 + python startup); at the ArduPilot default of 5 s that trips
  # the GCS failsafe (FS_GCS_ENABLE=LAND per docs/deployment-safety.md) and the FC LANDS
  # itself mid-flight — flight-2 finding. 20 s rides through a process restart while a
  # truly dead Pi (or the rung-4 reboot, ~48 s) still fails safe. Engaged coverage for a
  # dead Pi stays with the GUIDED command timeout (levels in ~3 s), not this.
  enforce_params:
    FS_GCS_TIMEOUT: 20
  stab_hover_throttle_us: 1450  # stabilize: starting hover guess (learner refines it live)
  # Adaptive hover: companion vertical-velocity hold trims throttle from VFR_HUD
  # climb rate so it self-levels (no manual hover tuning). Frozen during a dive.
  stab_hover_learn: true
  stab_hover_learn_kp: 50.0     # PWM per (m/s) climb — immediate damping (anti-oscillation)
  stab_hover_learn_gain: 20.0   # Ki: PWM per (m/s) climb per second — slow hover trim
  stab_hover_learn_band: 0.05   # hold deadband for the thrust-stick vertical path
                                # (the closed-loop dive commands a rate, not a stick)
  stab_hover_min_us: 1200
  stab_hover_max_us: 1700
  angle_max_deg: 45.0        # full roll/pitch stick = this lean (match FC ANGLE_MAX)
  pilot_yaw_rate_dps: 180.0  # full yaw stick = this yaw rate (SITL-measured ~180)
  rc_roll_sign: 1            # per-axis stick sign; bench/SITL validate (audit §4)
  rc_pitch_sign: 1
  rc_yaw_sign: 1

# ATTITUDE-domain guidance (ALT_HOLD RC-override surface). See docs/gps-denied-modes.md.
guidance:
  max_yaw_rate_dps: 60
  max_pitch_deg: 15.0
  pixel_deadzone_px: 8       # small deadband -> clean centre hit (was 20 -> ~20px terminal miss)
  yaw_p_gain: 0.15
  yaw_ff_gain: 0.05
  # TRACK holds the distance AT ENGAGEMENT (whatever the gap is when you flick to
  # TRACK), not a fixed standoff — it maintains, it never flies in. desired_bbox_frac
  # is only the STANDBY-preview nominal framing (~11.5 m for a 1.7 m subject here).
  desired_bbox_frac: 0.15
  # Closure gains act on the RANGE-LINEAR error (engage_setpoint - 1/size_frac), so
  # the scale is inverse-size (a few, not tens). PI: P holds, the integral keeps the
  # engage distance exactly on a moving target (sim: +0.1 m, no oscillation). Same
  # gains hold across distances (the loop is conditioned). closure_i_gain 0 = pure-P.
  closure_p_gain: 4.0
  closure_i_gain: 1.0
  # TRACK pitch is PURE range-hold (the closure above): it holds the engage distance
  # and does not vertically centre. A vertical re-centring nudge (track_vcenter_gain)
  # fights the range-hold on a fixed camera — centring a low target means nose-down,
  # which drifts forward and CLOSES the range TRACK is meant to hold (and nods) — so
  # it is OFF. The target sits at its natural depression (low when you're above it)
  # but stays framed; DIVE does the vertical aiming.
  pitch_p_gain: 0.15        # deg pitch per px of vertical error (DIVE aim)
  track_vcenter_gain: 0.0   # TRACK vertical re-centre — OFF (fights range-hold; see above)
  # --- DIVE: closed-loop constant-bearing homing (see docs/dive-guidance.md) ---
  # PITCH is a fixed gentle forward lean (a steeper lean over-depresses the fixed
  # camera and pushes an ABOVE target out the top); the THROTTLE flies a commanded
  # vertical RATE that holds the target's vertical frame position. Holding a fixed
  # frame point is a constant bearing -> a collision course, so the flight path
  # follows the line of sight onto a target below, level, OR above. Sim + SITL
  # validated (closed_loop_sim.py, validate_vrate_sitl.py).
  # Forward lean is COMMITTED: held steep so the dive keeps intercept speed all the
  # way in, eased toward gentle only when actually CLIMBING to an above target (a
  # steep lean there pushes it out the top). Tying the lean to the instantaneous
  # descent instead let it collapse to gentle the moment the homing centred the
  # target, so a high dive descended onto the line of sight then CRAWLED and never
  # arrived — the committed lean fixes that (sim: hits from 15-55 m altitude).
  dive_forward_deg: 20.0    # committed forward lean (held steep through the dive). Steeper than
                            # the original 14 for a FASTER dive — the pitch-fold holds the target
                            # high in frame (aim near the top to maximise forward
                            # thrust), so the steeper nose-down keeps it framed instead of losing it.
  dive_climb_forward_deg: 6.0   # gentle lean reached only when climbing hard to an above target
  dive_max_pitch_deg: 30.0  # DIVE nose-down clamp (steeper than the gentler TRACK max_pitch_deg)
  dive_lean_ramp_s: 0.5      # soft-start: ramp the lean in over this many s at commit
  dive_lean_tau_s: 1.5       # low-pass on the dive lean: nose travels steadily, no up/down nod
  dive_pitch_fold: 0.6       # fold a FRACTION of the measured airframe pitch into the dive vertical
                            # error: the nose-down lean depresses the fixed camera, so a far ground
                            # target appears frame-centred while the aircraft is still high above it —
                            # frame-only homing (fold 0) reads "on bearing", stops descending, and
                            # ORBITS at altitude. Folding pitch recovers the target's true angle below
                            # the horizon so the dive keeps descending onto it. FULL fold (1.0) is
                            # pure-pursuit-in-elevation and OVER-descends a far high target (curves
                            # down early, lands short); 0.6 descends enough to avoid the orbit but
                            # shallow enough to reach — Gazebo-verified striking from alt 25-55 m.
  vfov_deg: 52.3            # camera vertical FoV (IMX500) — converts measured pitch to frame units
  dive_terminal_lock_frac: 0.5  # once the bbox fills >half the frame, impact is ~a metre or two away
                            # and the blob centroid clips/jumps — commit BALLISTIC (freeze yaw, ride
                            # the gyro for descent) so the aim doesn't chase the jitter into a corner.
  # YAW/ROLL BLEND — bank to translate sideways onto the target (yaw turns toward it when
  # far, roll banks to slide on near centre). GENTLE + HEAVILY DAMPED here: the fixed
  # (airframe-bolted) camera rolls the image when it banks, so a high-gain bank oscillates
  # and rotates the target out of the frame (it lost the lock in Gazebo). Low gain + a big
  # PD derivative keeps the bank stable — it holds the lock and strikes an off-axis target.
  # The bank is modest on purpose: with STABILISE + RC-angle control (not attitude-RATE
  # control) the lateral-position loop has limited phase margin, so a strong bank can't be
  # flown safely on the fixed camera. It is inert for a centred target (dx~0 -> bank~0), so
  # it never disturbs the core centre-mass dive; it just adds gentle lateral help off-axis.
  dive_roll_gain: 0.05      # deg bank per px of horizontal error (gentle; 0 = yaw-only)
  dive_roll_damp: 0.45      # PD derivative (deg bank per px/s) — heavy, to stop the bank oscillating
  dive_max_roll_deg: 14.0   # bank-angle clamp
  yaw_roll_blend_px: 160.0  # |dx| at/above which it's pure yaw; below, roll fades in
  roll_compensate: true     # de-rotate the frame error by the measured bank (for when roll is on)
  dive_center_frac: 0.30    # horizontal aim tolerance before committing vertical
  dive_vrate_gain: 18.0     # m/s of climb command per unit normalised vertical frame error.
                            # Higher gain -> smaller pure-P steady-state offset: the terminal aim
                            # sat ~17px LOW at gain 12 (a sustained descent needs a residual error);
                            # 18 brings it to ~11px, a cleaner centre hit.
  dive_vrate_damp: 6.0      # derivative damping (m/s per err/s) — kills the dive up/down wiggle;
                            # scaled up with the gain so the higher-gain homing stays non-oscillatory
  dive_max_descent_mps: 8.0 # clamp on commanded descent
  dive_max_climb_mps: 4.0   # clamp on commanded climb (gravity-limited, < descent)
  # Sign overrides — MUST be bench-validated (docs/deployment-safety.md §4).
  yaw_sign: 1.0
  pitch_sign: 1.0

safety:
  watchdog_timeout_ms: 250
  require_armed: true
  min_track_quality: 0.35
