# IMX500 airframe config — Sony IMX500 AI camera (on-sensor NPU) + ArduPilot FC.
# Deployed on the Pi Zero 2W rig. The sensor runs the network on its own NPU, so
# there is NO CPU detector and ncnn is intentionally NOT installed; the .rpk model
# below is uploaded to the sensor at startup (see camera/imx500.py).
#   run: python -m pi_fpv_companion --config config/imx500.yaml

video:
  tv_mode: PAL
  width: 720
  height: 576
  framebuffer: /dev/fb0      # auto-falls back to DRM /dev/dri/card0, then cv2 window

camera:
  type: imx500               # on-sensor inference; detections emitted inline in FrameBundle
  framerate: 30
  imx500_model: /usr/share/imx500-models/imx500_network_ssd_mobilenetv2_fpnlite_320x320_pp.rpk

detector:
  type: none                 # IMX500 does detection on-sensor — no CPU/ncnn model
  # conf_threshold + classes_of_interest are still read here and applied by
  # IMX500Camera when it decodes the sensor's output tensors.
  conf_threshold: 0.35
  classes_of_interest: [person, car, truck, motorcycle, bus, boat]

tracker:
  type: multi_iou            # track ALL detections + operator selection (select_channel).
                             # 'iou' = single auto-locked target (no manual select).
  iou_threshold: 0.3
  reacquire_after_lost_frames: 30

fc:
  backend: ardupilot
  uart_device: /dev/serial0  # PL011 on header pins 8/10 (after dtoverlay=disable-bt)
  baud: 115200
  switch_channel: 7          # 3-position mode switch (STANDBY / TRACK / DIVE)
  # Target selector: a rising edge past 1700 µs in STANDBY cycles the locked target
  # among detections (frozen once engaged). The TBS top switches are full (ch5 arm,
  # ch6 FC modes, ch7 companion, ch8 camera), so this uses the first free CRSF
  # channel, ch9 — map a spare TBS input (e.g. the rocker) to ch9 in FreedomTX.
  # 0 = disabled (auto-lock highest confidence; HUD still shows all).
  select_channel: 9
  track_threshold_us: 1300   # pwm >= this -> TRACK (follow + hold range)
  dive_threshold_us: 1700    # pwm >= this -> DIVE (close the gap + dive); else STANDBY
  # GPS-denied path: ch7 engages. On TRACK/DIVE the Pi injects AETR sticks via
  # RC_CHANNELS_OVERRIDE into a self-levelling pilot mode; STANDBY releases them.
  # control_mode MUST match the FC's mode. stabilize (DEFAULT) = direct throttle,
  # 0.5=hover, no alt hold -> true steep dive (~16 m/s); companion owns altitude.
  # althold = climb-rate throttle (0.5=hold via baro), descent capped (gentle).
  control_mode: stabilize
  stab_hover_throttle_us: 1450  # stabilize: starting hover guess (learner refines it live)
  # Adaptive hover: companion vertical-velocity hold trims throttle from VFR_HUD
  # climb rate so it self-levels (no manual hover tuning). Frozen during a dive.
  stab_hover_learn: true
  stab_hover_learn_kp: 50.0     # PWM per (m/s) climb — immediate damping (anti-oscillation)
  stab_hover_learn_gain: 20.0   # Ki: PWM per (m/s) climb per second — slow hover trim
  stab_hover_learn_band: 0.05   # hold deadband for the thrust-stick vertical path
                                # (the closed-loop dive commands a rate, not a stick)
  stab_hover_min_us: 1200
  stab_hover_max_us: 1700
  angle_max_deg: 45.0        # full roll/pitch stick = this lean (match FC ANGLE_MAX)
  pilot_yaw_rate_dps: 180.0  # full yaw stick = this yaw rate (SITL-measured ~180)
  rc_roll_sign: 1            # per-axis stick sign; bench/SITL validate (audit §4)
  rc_pitch_sign: 1
  rc_yaw_sign: 1

# ATTITUDE-domain guidance (ALT_HOLD RC-override surface). See docs/gps-denied-modes.md.
guidance:
  max_yaw_rate_dps: 60
  max_pitch_deg: 15.0
  pixel_deadzone_px: 20
  yaw_p_gain: 0.15
  yaw_ff_gain: 0.05
  desired_bbox_frac: 0.30
  closure_p_gain: 50.0
  # Vertical centring (TRACK pitch P on vertical pixel error). TRACK adds
  # track_vcenter_gain on top of range-hold so the target stays centred as a
  # forward lean tilts the fixed camera down (target rises in frame). 0 = off.
  pitch_p_gain: 0.15        # deg pitch per px of vertical error (TRACK)
  track_vcenter_gain: 0.10  # deg pitch per px of vertical error (TRACK re-centre)
  # --- DIVE: closed-loop constant-bearing homing (see docs/dive-guidance.md) ---
  # PITCH is a fixed gentle forward lean (a steeper lean over-depresses the fixed
  # camera and pushes an ABOVE target out the top); the THROTTLE flies a commanded
  # vertical RATE that holds the target's vertical frame position. Holding a fixed
  # frame point is a constant bearing -> a collision course, so the flight path
  # follows the line of sight onto a target below, level, OR above. Sim + SITL
  # validated (closed_loop_sim.py, validate_vrate_sitl.py).
  # Forward lean is adaptive: STEEP (fast) diving onto a below target, GENTLE when
  # level/climbing toward an above one (a steep lean would push it out the top).
  dive_forward_deg: 25.0    # steep lean at full descent — fast, committed ground attack
  dive_climb_forward_deg: 6.0   # gentle lean when level/climbing (keeps an above target framed)
  dive_max_pitch_deg: 30.0  # DIVE nose-down clamp (steeper than the gentler TRACK max_pitch_deg)
  dive_lean_ramp_s: 0.5      # soft-start: ramp the steep lean in over this many s at commit
  dive_center_frac: 0.30    # horizontal aim tolerance before committing vertical
  dive_vrate_gain: 17.0     # m/s of climb command per unit normalised vertical frame error
  dive_max_descent_mps: 8.0 # clamp on commanded descent
  dive_max_climb_mps: 4.0   # clamp on commanded climb (gravity-limited, < descent)
  # Sign overrides — MUST be bench-validated (docs/deployment-safety.md §4).
  yaw_sign: 1.0
  pitch_sign: 1.0

safety:
  watchdog_timeout_ms: 250
  require_armed: true
  min_track_quality: 0.35

cpu:
  # Core-pinning isolates the CPU detector worker from capture/main loop. The
  # IMX500 path has no CPU detector, so let the pipeline use all cores.
  pin: false
