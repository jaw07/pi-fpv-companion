# Camera-only BENCH rig — no FC, no VTX. IMX500 perception runs end-to-end and the
# composited frame (bbox + HUD, identical to the flight TV-out) is served as a
# browser MJPEG stream instead of the framebuffer:
#   run:  python -m pi_fpv_companion --config config/bench-stream.yaml
#   view: http://<pi-ip>:8080/
# The switch is permanently STANDBY (NullFC) so nothing is ever commanded anywhere;
# use --force-mode track / dive to preview engaged guidance on the HUD.

video:
  tv_mode: PAL
  width: 720
  height: 576
  web_stream_port: 8080      # BENCH ONLY: browser MJPEG at http://<pi>:8080/
  web_stream_quality: 80
  web_stream_fps: 15         # stream rate cap; the pipeline still runs at full camera fps

camera:
  type: imx500               # on-sensor inference; detections emitted inline
  framerate: 30
  # Model bakeoff (bench): swap this line to compare. The decoder auto-profiles by
  # filename (yolo* -> xyxy/input-px/COCO-80; ssd/nanodet -> yxyx/normalized).
  #   nanodet_plus_416x416_pp   — fast (~26 fps NPU), low/poorly-calibrated scores
  #   yolo11n_pp                — better mAP + calibrated scores, slower NPU
  #   yolo26n_pp                — newest (Jan 2026), edge-first; identical tensor fmt
  imx500_model: /opt/pi-fpv-companion/models/imx500_network_yolo11n_visdrone416_pp.rpk
  # This bench Pi uploads the network firmware at ~65 kB/s (~50 s) — the 15 s flight
  # default would watchdog-kill the process mid-upload.
  first_frame_grace_s: 120

detector:
  type: none                 # IMX500 does detection on-sensor
  # YOLO11n/YOLO26n are WELL-CALIBRATED (real objects ~0.8, background junk ~0.05-0.2),
  # unlike NanoDet's washed-out scores — so a firm threshold cleanly separates them.
  # This is the primary ghost filter at the YOLO NPU rate (confirm_hits can't latch
  # M-of-N frames when detections arrive every ~6th frame).
  conf_threshold: 0.50
  classes_of_interest: [pedestrian, people, car, van, truck, bus, motor]

tracker:
  type: multi_iou
  iou_threshold: 0.3
  # Drop coasting tracks fast. At the YOLO NPU rate (~5.5 Hz) a ghost gets one
  # position sample, the tracker infers a wild velocity, and a long coast lets it
  # streak off-screen. 8 frames still bridges the ~6-frame gap between real
  # detections but kills a runaway in ~0.25s. (Flight may want a touch more.)
  reacquire_after_lost_frames: 8
  # Show immediately (confirm_hits 1). The YOLO NPU rate is far below camera fps,
  # so a 3-of-5 frame gate can't latch; conf_threshold is the ghost filter instead.
  confirm_hits: 1
  confirm_window: 5

fc:
  backend: none              # NO flight controller on this rig
  select_channel: 0          # no RC either — auto-lock highest confidence
  # stabilize selects the ATTITUDE pipeline path, which previews the guidance
  # intent on the HUD even in STANDBY — that preview is the point of the bench rig.
  control_mode: stabilize

safety:
  watchdog_timeout_ms: 250
  require_armed: true        # never true with NullFC -> guidance preview only
  min_track_quality: 0.35

# Bench rig: keep the journald logs, skip the flight blackbox.
flight_log:
  enabled: false
